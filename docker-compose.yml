version: "3.9"

services:
  # ─── Banco de Dados ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: conectar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-conectar}
      POSTGRES_USER: ${POSTGRES_USER:-conectar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-conectar123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - conectar_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conectar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: conectar_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - conectar_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend NestJS ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: conectar_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8001
      DATABASE_URL: postgresql://${POSTGRES_USER:-conectar}:${POSTGRES_PASSWORD:-conectar123}@postgres:5432/${POSTGRES_DB:-conectar}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      STORAGE_PATH: /app/storage
      FRONTEND_URL: http://localhost:8000
      AI_SERVICE_URL: http://ai-service:8003
    ports:
      - "8001:8001"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - conectar_network

  # ─── Frontend Next.js ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: conectar_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_WS_URL: http://localhost:8001
    ports:
      - "8000:8000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - conectar_network

  # ─── AI Service (Gemini) ──────────────────────────────────────────────────
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: conectar_ai_service
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8003
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash-exp}
    ports:
      - "8003:8003"
    volumes:
      - ./apps/ai-service:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - conectar_network

  # ─── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: conectar_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./storage:/var/www/storage:ro
    depends_on:
      - frontend
      - backend
    networks:
      - conectar_network
    profiles:
      - production

volumes:
  postgres_data:
    name: conectar_postgres_data
  redis_data:
    name: conectar_redis_data

networks:
  conectar_network:
    name: conectar_network
    driver: bridge
